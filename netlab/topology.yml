  r1:
  r2:
  r3:
  r4:
  r5:
  r6:
  r7:
  r8:
  r9:
  r10:
  h1:
    device: linux
    image: python:3-trixie
    config: [ config_h1 ]
    module: [ routing ]
    routing.static:
    - ipv4: 10.0.42.0/24
      nexthop.node: r0
